<!DOCTYPE html>
<html>
<head>
<title>Crash</title>
<style>
body{
 background:#020617;
 color:white;
 text-align:center;
 font-family:Arial;
}
#mult{
 font-size:60px;
 margin-top:100px;
}
button{
 padding:15px;
 background:lime;
 border:none;
 border-radius:10px;
}
</style>
</head>

<body>

<h1>💎 Crash</h1>

<div id="mult">1.00x</div>

<button onclick="apostar()">Apostar</button>

<script>
let rodando = false;

function apostar(){
 if(rodando) return;

 rodando = true;
 let m = 1;
 let intervalo = setInterval(()=>{
  m += 0.05;
  mult.innerText = m.toFixed(2)+"x";

  if(Math.random() < 0.03){
   clearInterval(intervalo);
   rodando = false;
   alert("CRASHOU!");
  }
 },100);
}
</script>

</body>
</html>
