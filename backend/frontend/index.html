<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
 margin:0;
 background:#0b0f1a;
 color:white;
 font-family:Arial;
}

.topo{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:#020617;
}

.banner{
 margin:15px;
 height:120px;
 border-radius:15px;
 background:linear-gradient(45deg,#22c55e,#4ade80);
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:20px;
}

.grid{
 display:grid;
 grid-template-columns: repeat(2,1fr);
 gap:15px;
 padding:15px;
}

.card{
 background:#111827;
 border-radius:15px;
 overflow:hidden;
 cursor:pointer;
 transition:0.2s;
}

.card:hover{
 transform:scale(1.05);
}

.card img{
 width:100%;
 height:100px;
 object-fit:cover;
}

.card p{
 padding:10px;
}
</style>
</head>

<body>

<div class="topo">
 <div>🎰 DOT77</div>
 <div id="saldo"></div>
</div>

<div class="banner">
 🎁 BÔNUS DE BOAS-VINDAS
</div>

<div class="grid">

 <div class="card">
  <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
  <p>🚀 Crash</p>
 </div>

 <div class="card">
  <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
  <p>🎰 Slots</p>
 </div>

 <div class="card">
  <img src="https://images.unsplash.com/photo-1606166325695-4d6b7a2a7d1f">
  <p>🎡 Roleta</p>
 </div>

 <div class="card">
  <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2">
  <p>⚽ Esportes</p>
 </div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));

async function carregar(){
 let res = await fetch("http://localhost:3000/saldo",{
  headers:{Authorization:user.token}
 });

 let data = await res.json();
 saldo.innerText="Saldo: "+data.saldo;
}

carregar();
</script>

</body>
</html>
