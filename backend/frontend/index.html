<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
 margin:0;
 background:#0b0f1a;
 color:white;
 font-family:Arial;
}

.topo{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:#111827;
}

.banner{
 margin:15px;
 padding:30px;
 border-radius:15px;
 background:linear-gradient(45deg,#22c55e,#4ade80);
 text-align:center;
 font-size:18px;
}

.grid{
 display:grid;
 grid-template-columns: repeat(2,1fr);
 gap:15px;
 padding:15px;
}

.card{
 background:#1f2937;
 padding:30px;
 border-radius:15px;
 text-align:center;
 font-size:18px;
 cursor:pointer;
 transition:0.2s;
}

.card:hover{
 transform:scale(1.05);
 background:#374151;
}
</style>
</head>

<body>

<div class="topo">
 <div>🎰 DOT77</div>
 <div id="saldo"></div>
</div>

<div class="banner">
 🎁 BÔNUS 100% ATÉ R$100
</div>

<div class="grid">
 <div class="card">🚀 Crash</div>
 <div class="card">🎰 Slots</div>
 <div class="card">🎡 Roleta</div>
 <div class="card">⚽ Esportes</div>
 <div class="card">💬 Chat</div>
 <div class="card">💸 Depositar</div>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
saldo.innerText = "Saldo: "+user.user.saldo;
</script>

</body>
</html>
