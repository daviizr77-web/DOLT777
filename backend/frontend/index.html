<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DOLT77</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f172a;
 color:white;
}

.top{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:#020617;
}

.logo{
 font-size:22px;
 font-weight:bold;
}

.balance{
 background:#16a34a;
 padding:8px 15px;
 border-radius:10px;
}

.games{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:15px;
}

.game{
 background:#1e293b;
 border-radius:12px;
 padding:20px;
 text-align:center;
 cursor:pointer;
 transition:0.3s;
}

.game:hover{
 transform:scale(1.05);
 background:#334155;
}

.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 justify-content:space-around;
 background:#020617;
 padding:10px;
}

.bottom div{
 cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
 <div class="logo">DOLT77 🎰</div>
 <div class="balance">R$ <span id="saldo">0</span></div>
</div>

<div class="games">

<div class="game" onclick="abrir()">🎰 Slots</div>
<div class="game" onclick="abrir()">🎲 Cassino Ao Vivo</div>
<div class="game" onclick="abrir()">⚽ Apostas Esportivas</div>
<div class="game" onclick="abrir()">💎 Crash</div>

</div>

<div class="bottom">
 <div>🏠</div>
 <div>💰 Depositar</div>
 <div>📤 Sacar</div>
 <div>👤 Perfil</div>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
if(user){
 saldo.innerText = user.saldo || 1000;
}

function abrir(){
 alert("Aqui entra integração com provedores 🎰");
}
</script>

</body>
</html>
